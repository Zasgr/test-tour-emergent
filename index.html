<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый проект</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading" class="loading">Загрузка панорамы...</div>
  <div id="viewer"></div>
  <div class="scene-title">
    <h2 id="scene-name"></h2>
    <p id="scene-info"></p>
  </div>
  <button id="home-btn" class="home-btn hidden" onclick="goHome()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </button>
  <button id="autorotate-btn" class="autorotate-btn" onclick="toggleAutorotate()" title="Автовращение">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
    </svg>
  </button>
  <button id="fullscreen-btn" class="fullscreen-btn" onclick="toggleFullscreen()" title="Полноэкранный режим">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
  </button>
  <div class="thumbnail-gallery" id="thumbnails"></div>
  <div id="info-popup" class="info-popup hidden"></div>
  <div id="minimap" class="minimap hidden"></div>
  <button id="minimap-toggle" class="minimap-toggle-btn hidden" onclick="toggleMinimap()" title="Показать карту">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/>
      <rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/>
    </svg>
  </button>
  
  <script src="vendor/marzipano.js"></script>
  <script src="data.js"></script>
  <script src="index.js"></script>
</body>
</html>
